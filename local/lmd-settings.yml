# Description: Lidarr Metadata Server config
networks:
  media:
    external: true

volumes:
  lmdconfig:
    driver_opts:
      type: none
      device: /home/fern/docker/data/musicbrainz/lmdconfig
      o: bind
    driver: local

services:
  lmd:
    image: blampe/lidarr.metadata:70a9707
    environment:
      DEBUG: false
      PRODUCTION: false
      USE_CACHE: true
      ENABLE_STATS: false
      ROOT_PATH: ""
      IMAGE_CACHE_HOST: "theaudiodb.com"
      EXTERNAL_TIMEOUT: 1000
      INVALIDATE_APIKEY: ""
      REDIS_HOST: "redis"
      REDIS_PORT: 6379
      FANART_KEY: ${MUSICBRAINZ_FANART_KEY}
      PROVIDERS__FANARTTVPROVIDER__0__0: ${MUSICBRAINZ_FANART_KEY}
      SPOTIFY_ID: ${MUSICBRAINZ_SPOTIFY_ID}
      SPOTIFY_SECRET: ${MUSICBRAINZ_SPOTIFY_SECRET}
      SPOTIFY_REDIRECT_URL: "http://localhost:5001"
      PROVIDERS__SPOTIFYPROVIDER__1__CLIENT_ID: ${MUSICBRAINZ_SPOTIFY_ID}
      PROVIDERS__SPOTIFYPROVIDER__1__CLIENT_SECRET: ${MUSICBRAINZ_SPOTIFY_SECRET}
      PROVIDERS__SPOTIFYAUTHPROVIDER__1__CLIENT_ID: ${MUSICBRAINZ_SPOTIFY_ID}
      PROVIDERS__SPOTIFYAUTHPROVIDER__1__CLIENT_SECRET: ${MUSICBRAINZ_SPOTIFY_SECRET}
      PROVIDERS__SPOTIFYAUTHPROVIDER__1__REDIRECT_URI: "http://localhost:5001"
      TADB_KEY: "2"
      PROVIDERS__THEAUDIODBPROVIDER__0__0: "2"
      LASTFM_KEY: ${MUSICBRAINZ_LASTFM_KEY}
      LASTFM_SECRET: ${MUSICBRAINZ_LASTFM_SECRET}
      PROVIDERS__SOLRSEARCHPROVIDER__1__SEARCH_SERVER: "http://search:8983/solr"
    restart: unless-stopped
    volumes:
      - lmdconfig:/config
    networks:
      - default
      - media
    depends_on:
      - db
      - mq
      - search
      - redis
